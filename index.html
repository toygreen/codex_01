<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --border: #e2e4e8;
    --text: #1a1d23;
    --text-secondary: #6b7280;
    --accent: #4f6ef7;
    --accent-hover: #3b57d9;
    --accent-light: #eef1ff;
    --done: #22c55e;
    --done-hover: #16a34a;
    --delete: #ef4444;
    --delete-hover: #dc2626;
    --priority-high: #ef4444;
    --priority-medium: #f59e0b;
    --priority-low: #6b7280;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --radius: 10px;
    --transition: 150ms ease;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }

  .app {
    width: 100%;
    max-width: 640px;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .app-header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .app-header h1 span { color: var(--accent); }

  .stats {
    font-size: 14px;
    color: var(--text-secondary);
    background: var(--surface);
    padding: 6px 14px;
    border-radius: 20px;
    box-shadow: var(--shadow);
  }

  /* ── Add Form ── */
  .add-form {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .add-form input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    outline: none;
    transition: border-color var(--transition);
    background: var(--surface);
  }

  .add-form input[type="text"]:focus {
    border-color: var(--accent);
  }

  .add-form select {
    padding: 0 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    outline: none;
    background: var(--surface);
    cursor: pointer;
    transition: border-color var(--transition);
  }

  .add-form select:focus { border-color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background var(--transition), transform var(--transition);
    padding: 0 18px;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .btn-icon {
    width: 34px;
    height: 34px;
    padding: 0;
    border-radius: 8px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 16px;
    transition: background var(--transition), color var(--transition);
  }

  .btn-icon:hover {
    background: var(--bg);
    color: var(--text);
  }

  .btn-icon.danger:hover {
    background: #fef2f2;
    color: var(--delete);
  }

  /* ── Filters ── */
  .toolbar {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    color: var(--text-secondary);
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .filter-btn .count {
    display: inline-block;
    margin-left: 4px;
    font-size: 11px;
    opacity: 0.7;
  }

  .toolbar-spacer { flex: 1; }

  .clear-done-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    color: var(--text-secondary);
  }
  .clear-done-btn:hover {
    border-color: var(--delete);
    color: var(--delete);
  }

  /* ── Todo List ── */
  .todo-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: opacity var(--transition), transform var(--transition);
    animation: slideIn 250ms ease;
  }

  .todo-item.done { opacity: 0.7; }
  .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-secondary); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .todo-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
  }

  .todo-check:hover { border-color: var(--accent); }

  .todo-check.checked {
    background: var(--done);
    border-color: var(--done);
  }

  .todo-check.checked::after {
    content: '';
    display: block;
    width: 6px;
    height: 10px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
    margin-top: -2px;
  }

  .priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .priority-dot.high   { background: var(--priority-high); }
  .priority-dot.medium { background: var(--priority-medium); }
  .priority-dot.low    { background: var(--priority-low); }

  .todo-text {
    flex: 1;
    font-size: 15px;
    line-height: 1.4;
    min-width: 0;
    word-break: break-word;
  }

  .todo-text.hidden { display: none; }

  .todo-edit {
    flex: 1;
    padding: 4px 8px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    font-size: 15px;
    outline: none;
    background: var(--surface);
    display: none;
  }

  .todo-edit.visible { display: block; }

  .todo-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }

  .empty-state svg {
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 15px;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    body { padding: 20px 12px; }
    .app-header h1 { font-size: 22px; }
    .add-form { flex-wrap: wrap; }
    .add-form input[type="text"] { min-width: 100%; }
    .add-form select { flex: 1; }
    .add-form .btn-primary { flex: 1; }
  }
</style>
</head>
<body>

<div class="app">

  <header class="app-header">
    <h1>Todo<span>List</span></h1>
    <span class="stats" id="stats">0 / 0</span>
  </header>

  <!-- Add -->
  <form class="add-form" id="addForm">
    <input type="text" id="todoInput" placeholder="Add a new task…" autofocus required>
    <select id="prioritySelect">
      <option value="medium">Medium</option>
      <option value="high">High</option>
      <option value="low">Low</option>
    </select>
    <button class="btn btn-primary" type="submit">Add</button>
  </form>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="filter-btn active" data-filter="all">All <span class="count" id="countAll">0</span></button>
    <button class="filter-btn" data-filter="active">Active <span class="count" id="countActive">0</span></button>
    <button class="filter-btn" data-filter="done">Done <span class="count" id="countDone">0</span></button>
    <span class="toolbar-spacer"></span>
    <button class="clear-done-btn" id="clearDone">Clear done</button>
  </div>

  <!-- List -->
  <ul class="todo-list" id="todoList"></ul>

</div>

<script>
  const STORAGE_KEY = 'codex_todos';
  let todos = [];
  let currentFilter = 'all';

  const $ = id => document.getElementById(id);
  const todoList   = $('todoList');
  const addForm    = $('addForm');
  const input      = $('todoInput');
  const priorityEl = $('prioritySelect');
  const stats      = $('stats');
  const countAll   = $('countAll');
  const countActive= $('countActive');
  const countDone  = $('countDone');
  const clearDone  = $('clearDone');

  /* ── Load / Save ── */
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      todos = raw ? JSON.parse(raw) : [];
    } catch { todos = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  /* ── CRUD ── */
  function addTodo(text, priority = 'medium') {
    todos.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      text: text.trim(),
      done: false,
      priority,
      createdAt: Date.now(),
    });
    save();
    render();
  }

  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) { todo.done = !todo.done; save(); render(); }
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  function updateTodoText(id, text) {
    const todo = todos.find(t => t.id === id);
    if (todo) { todo.text = text.trim(); save(); render(); }
  }

  function clearDoneTodos() {
    todos = todos.filter(t => !t.done);
    save();
    render();
  }

  /* ── Filtered view ── */
  function getFiltered() {
    if (currentFilter === 'active') return todos.filter(t => !t.done);
    if (currentFilter === 'done')   return todos.filter(t => t.done);
    return todos;
  }

  /* ── Render ── */
  function render() {
    const filtered = getFiltered();
    const doneCount = todos.filter(t => t.done).length;
    const activeCount = todos.length - doneCount;

    stats.textContent = `${doneCount} / ${todos.length}`;
    countAll.textContent   = todos.length;
    countActive.textContent = activeCount;
    countDone.textContent  = doneCount;

    // Re-order: active first, then done, sorted by createdAt within each group
    const sorted = [...filtered].sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return b.createdAt - a.createdAt;
    });

    if (sorted.length === 0) {
      todoList.innerHTML = `
        <li class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
          <p>${todos.length === 0 ? 'No tasks yet. Add one above!' : 'No tasks match this filter.'}</p>
        </li>`;
      return;
    }

    todoList.innerHTML = sorted.map(todo => {
      const checked = todo.done ? 'checked' : '';
      const textHidden = todo.done ? 'hidden' : '';
      const editVisible = todo.done ? '' : 'visible';
      return `
        <li class="todo-item ${todo.done ? 'done' : ''}" data-id="${todo.id}">
          <div class="todo-check ${checked}" data-action="toggle"></div>
          <span class="priority-dot ${todo.priority}"></span>
          <span class="todo-text ${textHidden}">${escapeHtml(todo.text)}</span>
          <input class="todo-edit ${editVisible}" type="text" value="${escapeHtml(todo.text)}" data-action="edit-input">
          <div class="todo-actions">
            <button class="btn-icon" data-action="edit" title="Edit">✎</button>
            <button class="btn-icon danger" data-action="delete" title="Delete">✕</button>
          </div>
        </li>`;
    }).join('');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  /* ── Event Delegation ── */
  todoList.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const li = btn.closest('.todo-item');
    if (!li) return;
    const id = li.dataset.id;

    const action = btn.dataset.action;

    if (action === 'toggle') { toggleTodo(id); return; }
    if (action === 'delete') { deleteTodo(id); return; }

    if (action === 'edit') {
      const textSpan = li.querySelector('.todo-text');
      const editInput = li.querySelector('.todo-edit');
      if (!textSpan || !editInput) return;
      textSpan.classList.add('hidden');
      editInput.classList.add('visible');
      editInput.value = todos.find(t => t.id === id)?.text || '';
      editInput.focus();
      editInput.select();
    }
  });

  todoList.addEventListener('keydown', e => {
    if (e.key === 'Escape' || e.key === 'Enter') {
      const editInput = e.target.closest('[data-action="edit-input"]');
      if (!editInput) return;
      const li = editInput.closest('.todo-item');
      if (!li) return;
      const id = li.dataset.id;

      if (e.key === 'Enter') {
        const val = editInput.value.trim();
        if (val) updateTodoText(id, val);
      }
      // blur in both cases (Enter or Escape)
      editInput.classList.remove('visible');
      li.querySelector('.todo-text')?.classList.remove('hidden');
      e.preventDefault();
    }
  });

  /* ── Add Form ── */
  addForm.addEventListener('submit', e => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    addTodo(text, priorityEl.value);
    input.value = '';
    input.focus();
  });

  /* ── Filters ── */
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  /* ── Clear Done ── */
  clearDone.addEventListener('click', () => {
    if (todos.some(t => t.done)) clearDoneTodos();
  });

  /* ── Init ── */
  load();
  render();
</script>
</body>
</html>
