 <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 540" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif">
 <defs>
   <filter id="s" x="-4%" y="-4%" width="108%" height="108%">
     <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
   </filter>
   <filter id="s2" x="-2%" y="-2%" width="104%" height="104%">
     <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.04"/>
   </filter>
   <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4f6ef7"/><stop offset="100%" stop-color="#3b57d9"/></linearGradient>
   <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#16a34a"/></linearGradient>
 </defs>
 
 <!-- Background -->
 <rect width="660" height="540" fill="#f4f5f7" rx="12"/>
 
 <!-- App container (640px max-width, centered) -->
 
 <!-- Header -->
 <text x="40" y="48" font-size="26" font-weight="700" fill="#1a1d23" letter-spacing="-0.3">Todo</text>
 <text x="98" y="48" font-size="26" font-weight="700" fill="#4f6ef7" letter-spacing="-0.3">List</text>
 
 <!-- Stats badge -->
 <rect x="510" y="28" width="110" height="28" rx="14" fill="#fff" filter="url(#s2)"/>
 <text x="565" y="47" font-size="14" fill="#6b7280" text-anchor="middle">2 / 5</text>
 
 <!-- Add form -->
 <rect x="40" y="72" width="490" height="42" rx="10" fill="#fff" stroke="#e2e4e8" stroke-width="2"/>
 <text x="56" y="97" font-size="15" fill="#9ca3af">Add a new task…</text>
 
 <rect x="542" y="72" width="70" height="42" rx="10" fill="#fff" stroke="#e2e4e8" stroke-width="2"/>
 <text x="560" y="97" font-size="13" fill="#6b7280">Medium</text>
 <polygon points="598,92 604,98 610,92" fill="#6b7280"/>
 
 <rect x="618" y="72" width="42" height="42" rx="10" fill="url(#g1)"/>
 <text x="639" y="98" font-size="20" fill="#fff" text-anchor="middle" font-weight="600">+</text>
 
 <!-- Toolbar -->
 <rect x="40" y="130" height="32" rx="16" fill="#fff" stroke="#e2e4e8" stroke-width="1"/><text x="58" y="150" font-size="13" font-weight="600" fill="#fff">All</text>
 <rect x="40" y="130" width="52" height="32" rx="16" fill="#4f6ef7" stroke="#4f6ef7" stroke-width="1"/>
 <text x="56" y="150" font-size="13" font-weight="600" fill="#fff">All</text><text x="76" y="150" font-size="11" fill="rgba(255,255,255,0.7)">5</text>
 
 <rect x="96" y="130" width="68" height="32" rx="16" fill="#fff" stroke="#e2e4e8" stroke-width="1"/>
 <text x="112" y="150" font-size="13" fill="#6b7280">Active</text><text x="150" y="150" font-size="11" fill="#9ca3af">3</text>
 
 <rect x="168" y="130" width="62" height="32" rx="16" fill="#fff" stroke="#e2e4e8" stroke-width="1"/>
 <text x="184" y="150" font-size="13" fill="#6b7280">Done</text><text x="217" y="150" font-size="11" fill="#9ca3af">2</text>
 
 <!-- Clear done -->
 <rect x="510" y="130" width="80" height="32" rx="16" fill="#fff" stroke="#e2e4e8" stroke-width="1"/>
 <text x="550" y="150" font-size="13" fill="#6b7280" text-anchor="middle">Clear done</text>
 
 <!-- Todo items -->
 <!-- Item 1: active, high priority -->
 <g filter="url(#s)">
   <rect x="40" y="180" width="580" height="48" rx="10" fill="#fff"/>
   <!-- Checkbox -->
   <circle cx="66" cy="204" r="10" fill="#fff" stroke="#e2e4e8" stroke-width="2"/>
   <!-- Priority dot (high = red) -->
   <circle cx="88" cy="204" r="4" fill="#ef4444"/>
   <!-- Text -->
   <text x="102" y="209" font-size="15" fill="#1a1d23">设计并实现用户登录页面</text>
   <!-- Edit button -->
   <rect x="560" y="192" width="24" height="24" rx="6" fill="transparent"/>
   <text x="572" y="209" font-size="14" fill="#6b7280" text-anchor="middle">✎</text>
   <!-- Delete button -->
   <rect x="588" y="192" width="24" height="24" rx="6" fill="transparent"/>
   <text x="600" y="209" font-size="14" fill="#6b7280" text-anchor="middle">✕</text>
 </g>
 
 <!-- Item 2: active, medium priority -->
 <g filter="url(#s)">
   <rect x="40" y="234" width="580" height="48" rx="10" fill="#fff"/>
   <circle cx="66" cy="258" r="10" fill="#fff" stroke="#e2e4e8" stroke-width="2"/>
   <circle cx="88" cy="258" r="4" fill="#f59e0b"/>
   <text x="102" y="263" font-size="15" fill="#1a1d23">编写 API 接口文档</text>
   <rect x="560" y="246" width="24" height="24" rx="6" fill="transparent"/>
   <text x="572" y="263" font-size="14" fill="#6b7280" text-anchor="middle">✎</text>
   <rect x="588" y="246" width="24" height="24" rx="6" fill="transparent"/>
   <text x="600" y="263" font-size="14" fill="#6b7280" text-anchor="middle">✕</text>
 </g>
 
 <!-- Item 3: active, low priority -->
 <g filter="url(#s)">
   <rect x="40" y="288" width="580" height="48" rx="10" fill="#fff"/>
   <circle cx="66" cy="312" r="10" fill="#fff" stroke="#e2e4e8" stroke-width="2"/>
   <circle cx="88" cy="312" r="4" fill="#6b7280"/>
   <text x="102" y="317" font-size="15" fill="#1a1d23">优化首页加载性能</text>
   <rect x="560" y="300" width="24" height="24" rx="6" fill="transparent"/>
   <text x="572" y="317" font-size="14" fill="#6b7280" text-anchor="middle">✎</text>
   <rect x="588" y="300" width="24" height="24" rx="6" fill="transparent"/>
   <text x="600" y="317" font-size="14" fill="#6b7280" text-anchor="middle">✕</text>
 </g>
 
 <!-- Item 4: done -->
 <g filter="url(#s)" opacity="0.7">
   <rect x="40" y="342" width="580" height="48" rx="10" fill="#fff"/>
   <circle cx="66" cy="366" r="10" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
   <polyline points="60,367 64,371 72,363" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
   <circle cx="88" cy="366" r="4" fill="#f59e0b"/>
   <text x="102" y="371" font-size="15" fill="#6b7280" text-decoration="line-through">完成项目技术选型评审</text>
 </g>
 
 <!-- Item 5: done -->
 <g filter="url(#s)" opacity="0.7">
   <rect x="40" y="396" width="580" height="48" rx="10" fill="#fff"/>
   <circle cx="66" cy="420" r="10" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
   <polyline points="60,421 64,425 72,417" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
   <circle cx="88" cy="420" r="4" fill="#ef4444"/>
   <text x="102" y="425" font-size="15" fill="#6b7280" text-decoration="line-through">搭建开发环境与 CI 流水线</text>
 </g>
 
 <!-- Decorative bottom area -->
 <text x="330" y="510" font-size="12" fill="#9ca3af" text-anchor="middle">纯前端 · 本地存储 · 响应式设计</text>
 </svg>
